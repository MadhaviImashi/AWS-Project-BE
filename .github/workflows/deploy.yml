name: Deploy Lambdas

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Lambda zips
        run: pnpm build:lambdas

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Deploy events-handler
        run: |
          aws lambda update-function-code \
            --function-name cw-events-handler \
            --zip-file fileb://dist/events-handler.zip \
            --region ap-southeast-1

      - name: Deploy registration-handler
        run: |
          aws lambda update-function-code \
            --function-name cw-registration-handler \
            --zip-file fileb://dist/registrations-handler.zip \
            --region ap-southeast-1

      - name: Deploy file-handler
        run: |
          aws lambda update-function-code \
            --function-name cw-file-handler \
            --zip-file fileb://dist/files-handler.zip \
            --region ap-southeast-1

      - name: Deploy auth-postConfirmation
        run: |
          aws lambda update-function-code \
            --function-name cw-auth-postConfirmation \
            --zip-file fileb://dist/auth-postConfirmation.zip \
            --region ap-southeast-1

      - name: Deploy email-handler
        run: |
          aws lambda update-function-code \
            --function-name cw-email-handler \
            --zip-file fileb://dist/email-handler.zip \
            --region ap-southeast-1
